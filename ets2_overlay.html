<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETS2 Telemetry Overlay</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: transparent;
    font-family: 'Segoe UI', sans-serif;
    width: 340px;
    padding: 0;
    overflow: hidden;
  }

  /* ── Conteneur principal ── */
  #hud {
    background: rgba(10,10,16,0.82);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 14px 18px;
    backdrop-filter: blur(12px);
    display: flex;
    flex-direction: column;
    gap: 12px;
    opacity: 0;
    transform: translateY(-8px);
    transition: opacity 0.4s ease, transform 0.4s ease;
    position: relative;
    overflow: hidden;
  }
  #hud.visible { opacity: 1; transform: translateY(0); }
  #hud.paused { opacity: 0.5; }

  /* Accent line top */
  #hud::before {
    content: '';
    position: absolute;
    top: 0; left: 16px; right: 16px;
    height: 2px;
    background: linear-gradient(90deg, #3897ff, #1db954, #a78bfa);
    border-radius: 0 0 4px 4px;
  }

  /* ── Ligne 1 : Vitesse + Rapport ── */
  .row-main {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 8px;
  }
  .speed-block { display: flex; align-items: flex-end; gap: 6px; }
  .speed-value {
    font-size: 52px;
    font-weight: 800;
    line-height: 1;
    color: #fff;
    letter-spacing: -2px;
    transition: color 0.3s ease;
  }
  .speed-value.over-limit { color: #ff4444; }
  .speed-unit {
    font-size: 13px;
    font-weight: 600;
    color: rgba(255,255,255,0.4);
    margin-bottom: 8px;
    letter-spacing: 1px;
  }

  /* Rapport de boite */
  .gear-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .gear-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
  }
  .gear-value {
    font-size: 36px;
    font-weight: 800;
    color: #a78bfa;
    line-height: 1;
    min-width: 32px;
    text-align: center;
    transition: color 0.2s ease, transform 0.2s cubic-bezier(0.34,1.4,0.64,1);
  }
  .gear-value.changed { transform: scale(1.3); color: #fff; }

  /* ── Ligne 2 : RPM bar ── */
  .rpm-section { display: flex; flex-direction: column; gap: 5px; }
  .rpm-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .rpm-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
  }
  .rpm-value {
    font-size: 11px;
    font-weight: 700;
    color: rgba(255,255,255,0.6);
    font-variant-numeric: tabular-nums;
  }
  .rpm-bar-bg {
    height: 6px;
    background: rgba(255,255,255,0.07);
    border-radius: 999px;
    overflow: hidden;
  }
  .rpm-bar-fill {
    height: 100%;
    border-radius: 999px;
    background: linear-gradient(90deg, #3897ff 0%, #1db954 60%, #ffb300 80%, #ff4444 100%);
    transition: width 0.3s ease;
    width: 0%;
  }

  /* ── Ligne 3 : Carburant + Distance ── */
  .row-stats {
    display: flex;
    gap: 10px;
  }
  .stat-block {
    flex: 1;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 10px;
    padding: 8px 12px;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .stat-lbl {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.28);
  }
  .stat-val {
    font-size: 16px;
    font-weight: 800;
    color: #fff;
    line-height: 1;
  }
  .stat-sub {
    font-size: 10px;
    color: rgba(255,255,255,0.3);
  }

  /* Barre carburant */
  .fuel-bar-bg {
    height: 3px;
    background: rgba(255,255,255,0.07);
    border-radius: 999px;
    overflow: hidden;
    margin-top: 4px;
  }
  .fuel-bar-fill {
    height: 100%;
    border-radius: 999px;
    background: #1db954;
    transition: width 0.8s ease, background 0.4s ease;
  }
  .fuel-bar-fill.low { background: #ffb300; }
  .fuel-bar-fill.critical { background: #ff4444; }

  /* ── Limite de vitesse ── */
  .speed-limit-badge {
    position: absolute;
    top: 14px; right: 14px;
    width: 34px; height: 34px;
    border-radius: 50%;
    background: #fff;
    border: 3px solid #e53935;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 800;
    color: #111;
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .speed-limit-badge.show { opacity: 1; }

  /* ── Heure jeu ── */
  .game-time {
    position: absolute;
    top: 18px; left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    font-weight: 700;
    color: rgba(255,255,255,0.25);
    letter-spacing: 2px;
    font-variant-numeric: tabular-nums;
  }

  /* ── État offline ── */
  #offline {
    display: none;
    padding: 12px 18px;
    background: rgba(10,10,16,0.7);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px;
    font-size: 12px;
    color: rgba(255,255,255,0.25);
    text-align: center;
    font-style: italic;
  }
  #offline.show { display: block; }
</style>
</head>
<body>

<div id="hud">
  <!-- Heure jeu -->
  <div class="game-time" id="game-time">--:--</div>

  <!-- Vitesse + Rapport -->
  <div class="row-main">
    <div class="speed-block">
      <div class="speed-value" id="speed">0</div>
      <div class="speed-unit">KM/H</div>
    </div>
    <div class="gear-block">
      <div class="gear-label">RAPPORT</div>
      <div class="gear-value" id="gear">N</div>
    </div>
  </div>

  <!-- RPM -->
  <div class="rpm-section">
    <div class="rpm-header">
      <div class="rpm-label">RPM</div>
      <div class="rpm-value" id="rpm-val">0</div>
    </div>
    <div class="rpm-bar-bg">
      <div class="rpm-bar-fill" id="rpm-bar"></div>
    </div>
  </div>

  <!-- Carburant + Distance -->
  <div class="row-stats">
    <div class="stat-block">
      <div class="stat-lbl">Carburant</div>
      <div class="stat-val" id="fuel-val">--</div>
      <div class="stat-sub" id="fuel-sub">-- L</div>
      <div class="fuel-bar-bg">
        <div class="fuel-bar-fill" id="fuel-bar"></div>
      </div>
    </div>
    <div class="stat-block">
      <div class="stat-lbl">Distance</div>
      <div class="stat-val" id="nav-dist">--</div>
      <div class="stat-sub" id="nav-time">--</div>
    </div>
  </div>

  <!-- Badge limite vitesse -->
  <div class="speed-limit-badge" id="speed-limit"></div>
</div>

<div id="offline">ETS2 non détecté</div>

<script>
  const BASE = 'wss://vyz.drt-hbr.sbs';
  let ws, reconnectTimer;
  let lastGear = 'N';

  function connect() {
    ws = new WebSocket(BASE.replace('https','wss').replace('http','ws') + '');
    // Utiliser le WS existant du serveur
    const wsUrl = 'wss://vyz.drt-hbr.sbs';
    ws = new WebSocket(wsUrl);

    ws.onopen = () => { console.log('[WS] connecté'); };

    ws.onmessage = e => {
      try {
        const d = JSON.parse(e.data);
        if (d.type === 'telemetry') updateHUD(d.data);
        if (d.type === 'telemetry_off') showOffline();
      } catch(err) {}
    };

    ws.onclose = () => {
      reconnectTimer = setTimeout(connect, 3000);
    };
    ws.onerror = () => ws.close();
  }

  function updateHUD(d) {
    const hud = document.getElementById('hud');
    const offline = document.getElementById('offline');
    hud.classList.add('visible');
    offline.classList.remove('show');
    hud.classList.toggle('paused', d.paused);

    // Vitesse
    const speedEl = document.getElementById('speed');
    speedEl.textContent = Math.round(d.speed);
    speedEl.classList.toggle('over-limit', d.navSpeedLimit > 0 && d.speed > d.navSpeedLimit + 5);

    // Rapport
    const gearEl = document.getElementById('gear');
    if (d.gear !== lastGear) {
      gearEl.classList.add('changed');
      setTimeout(() => gearEl.classList.remove('changed'), 300);
      lastGear = d.gear;
    }
    gearEl.textContent = d.gear;

    // RPM
    document.getElementById('rpm-val').textContent = d.rpm.toLocaleString('fr-FR');
    const rpmPct = Math.min(100, Math.round(d.rpm / (d.rpmMax || 2500) * 100));
    document.getElementById('rpm-bar').style.width = rpmPct + '%';

    // Carburant
    document.getElementById('fuel-val').textContent = d.fuelPct + '%';
    document.getElementById('fuel-sub').textContent = Math.round(d.fuel) + ' / ' + Math.round(d.fuelCapacity) + ' L';
    const fuelBar = document.getElementById('fuel-bar');
    fuelBar.style.width = d.fuelPct + '%';
    fuelBar.className = 'fuel-bar-fill' + (d.fuelPct < 10 ? ' critical' : d.fuelPct < 25 ? ' low' : '');

    // Navigation
    const distEl = document.getElementById('nav-dist');
    const timeEl = document.getElementById('nav-time');
    if (d.navDistKm > 0) {
      distEl.textContent = d.navDistKm + ' km';
      timeEl.textContent = d.navMinutes > 0 ? '~' + d.navMinutes + ' min' : '--';
    } else {
      distEl.textContent = '--';
      timeEl.textContent = 'No GPS';
    }

    // Limite vitesse
    const limitEl = document.getElementById('speed-limit');
    if (d.navSpeedLimit > 0) {
      limitEl.textContent = d.navSpeedLimit;
      limitEl.classList.add('show');
    } else {
      limitEl.classList.remove('show');
    }

    // Heure jeu
    document.getElementById('game-time').textContent = d.gameTime || '--:--';
  }

  function showOffline() {
    document.getElementById('hud').classList.remove('visible');
    document.getElementById('offline').classList.add('show');
  }

  connect();
</script>
</body>
</html>
