<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Overlay — Dashboard</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f0c20 0%, #15102a 100%);
            --spotify-green: #1DB954;
            --spotify-hover: #1ed760;
            --panel-bg: rgba(255, 255, 255, 0.03);
            --panel-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: #a0aec0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 550px;
            background: rgba(20, 15, 38, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--panel-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            animation: fadeIn 0.6s ease-out;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #fff, var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 32px;
        }

        /* Status Widget */
        .status-card {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 16px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
        }

        .status-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background: #e53e3e;
            border-radius: 50%;
            box-shadow: 0 0 12px #e53e3e;
            transition: all 0.3s ease;
        }

        .status-dot.active {
            background: var(--spotify-green);
            box-shadow: 0 0 12px var(--spotify-green);
        }

        .status-text {
            font-weight: 500;
            font-size: 15px;
        }

        /* Forms */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            padding: 14px 16px;
            color: #fff;
            font-size: 15px;
            transition: all 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: rgba(29, 185, 84, 0.5);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 3px rgba(29, 185, 84, 0.15);
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
            text-decoration: none;
        }

        .btn-primary {
            background: #ffffff;
            color: #0f0c20;
            margin-top: 10px;
        }

        .btn-primary:hover {
            background: #e2e8f0;
            transform: translateY(-1px);
        }

        .btn-spotify {
            background: var(--spotify-green);
            color: #ffffff;
            margin-top: 24px;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(29, 185, 84, 0.25);
        }

        .btn-spotify:hover {
            background: var(--spotify-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(29, 185, 84, 0.35);
        }

        /* Alerts */
        .alert {
            padding: 14px 16px;
            border-radius: 12px;
            margin-bottom: 24px;
            font-size: 14px;
            font-weight: 500;
            display: none;
            animation: slideDown 0.3s ease-out;
        }
        .alert-success {
            background: rgba(29, 185, 84, 0.15);
            border: 1px solid rgba(29, 185, 84, 0.3);
            color: #61d484;
        }
        .alert-error {
            background: rgba(229, 62, 62, 0.15);
            border: 1px solid rgba(229, 62, 62, 0.3);
            color: #f56565;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Spotify Navigation</h1>
        <div class="subtitle">Configuration du module d'affichage en temps réel</div>

        <!-- Notification Banner -->
        <div id="alertBox" class="alert"></div>

        <!-- Real-time Status Card -->
        <div class="status-card">
            <div class="status-info">
                <div id="statusDot" class="status-dot"></div>
                <div id="statusText" class="status-text">Vérification du système...</div>
            </div>
        </div>

        <!-- Credentials Form -->
        <form id="configForm">
            <div class="form-group">
                <label for="clientId">Client ID Spotify</label>
                <input type="text" id="clientId" placeholder="Insère ton Client ID" required>
            </div>
            <div class="form-group">
                <label for="clientSecret">Client Secret Spotify</label>
                <input type="password" id="clientSecret" placeholder="Insère ton Client Secret" required>
            </div>
            <button type="submit" class="btn btn-primary">Enregistrer la configuration</button>
        </form>

        <!-- Dynamic Auth Link (No absolute URLs used) -->
        <a href="/auth" id="authBtn" class="btn btn-spotify" style="display: none;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm4.586 14.424c-.18.295-.565.387-.86.207-2.377-1.454-5.37-1.783-8.894-.982-.336.074-.67-.142-.744-.48-.074-.335.143-.67.48-.743 3.856-.88 7.15-.51 9.812 1.122.296.18.387.563.206.86zm1.224-2.72c-.227.367-.707.487-1.074.26-2.72-1.672-6.87-2.157-10.082-1.182-.413.125-.85-.107-.975-.522-.125-.413.108-.85.522-.975 3.678-1.117 8.247-.573 11.35 1.335.367.226.487.707.26 1.074zm.106-2.833C14.384 8.78 8.463 8.583 5.042 9.62c-.524.16-1.078-.14-1.24-.663-.16-.524.14-1.08.663-1.242 3.93-1.192 10.48-.966 14.542 1.444.472.28.625.894.344 1.367-.28.472-.893.626-1.366.345z"/></svg>
            Se connecter avec Spotify
        </a>
    </div>

    <script>
        // Extraction des paramètres d'URL pour afficher des alertes d'état
        const urlParams = new URLSearchParams(window.location.search);
        const alertBox = document.getElementById('alertBox');

        if (urlParams.has('success')) {
            alertBox.className = "alert alert-success";
            alertBox.innerText = "Authentification Spotify réussie ! Votre overlay est prêt.";
            alertBox.style.display = "block";
        } else if (urlParams.has('error')) {
            alertBox.className = "alert alert-error";
            const err = urlParams.get('error');
            alertBox.innerText = err === 'denied' ? "Accès refusé par l'utilisateur." : "Erreur de récupération du jeton d'accès.";
            alertBox.style.display = "block";
        }

        // Récupération automatique du statut backend
        async function checkStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                
                const dot = document.getElementById('statusDot');
                const text = document.getElementById('statusText');
                const authBtn = document.getElementById('authBtn');

                if (data.hasCredentials) {
                    document.getElementById('clientId').value = data.clientId || '';
                    // On ne remplit pas le secret par sécurité s'il existe déjà
                    document.getElementById('clientSecret').placeholder = "••••••••••••••••";
                }

                if (data.connected && data.hasToken) {
                    dot.className = "status-dot active";
                    text.innerText = "Connecté à Spotify — Tout fonctionne !";
                    authBtn.style.display = "inline-flex";
                    authBtn.innerText = "Reconnecter un autre compte";
                } else if (data.hasCredentials) {
                    dot.className = "status-dot";
                    dot.style.background = "#dd6b20";
                    dot.style.boxShadow = "0 0 12px #dd6b20";
                    text.innerText = "Identifiants configurés. Liaison Spotify requise.";
                    authBtn.style.display = "inline-flex";
                } else {
                    dot.className = "status-dot";
                    text.innerText = "En attente des identifiants Spotify API...";
                    authBtn.style.display = "none";
                }
            } catch (e) {
                document.getElementById('statusText').innerText = "Impossible de joindre le serveur.";
            }
        }

        // Soumission asynchrone du formulaire
        document.getElementById('configForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const clientId = document.getElementById('clientId').value;
            const clientSecret = document.getElementById('clientSecret').value;

            try {
                const res = await fetch('/api/config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ clientId, clientSecret })
                });
                
                if (res.ok) {
                    alertBox.className = "alert alert-success";
                    alertBox.innerText = "Identifiants enregistrés avec succès ! Cliquez sur le bouton Spotify ci-dessous.";
                    alertBox.style.display = "block";
                    checkStatus();
                } else {
                    throw new Error();
                }
            } catch (e) {
                alertBox.className = "alert alert-error";
                alertBox.innerText = "Erreur lors de la sauvegarde de la configuration.";
                alertBox.style.display = "block";
            }
        });

        // Premier appel au chargement
        checkStatus();
    </script>
</body>
</html>
